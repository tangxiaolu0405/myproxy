name: 跨平台编译 (Fyne)

on:
  push:
    tags:
      - 'v*' # 只有推送到 v1.0.0 这种标签时才触发发布

jobs:
  release:
    runs-on: ubuntu-latest # Fyne-cross 在 Linux 环境下运行最稳
    steps:
      - uses: actions/checkout@v4

      - name: 设置 Go 环境
        uses: actions/setup-go@v5
        with:
          go-version: '1.21' # 根据你的项目调整版本

      # 使用 fyne-cross 进行交叉编译
      - name: 编译多平台二进制文件
        run: |
          go install github.com/fyne-io/fyne-cross@latest
          # 编译 Windows (amd64)
          fyne-cross windows -arch=amd64
          # 编译 Linux (amd64)
          fyne-cross linux -arch=amd64
          # 编译 macOS (darwin amd64)，如需支持 M1/M2 可增加 -arch=arm64
          fyne-cross darwin -arch=amd64

      # 自动创建 GitHub Release 并上传文件
      - name: 发布到 Release
        uses: softprops/action-gh-release@v1
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: |
            fyne-cross/dist/windows-amd64/*.zip
            fyne-cross/dist/linux-amd64/*.tar.xz
            fyne-cross/dist/darwin-amd64/*.app.tar.xz
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
